<html>

<head>
    <meta charset="UTF-8">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        body {
            font-family: Arial;
        }

        .filters {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .btn {
            padding: 6px 12px;
            border-radius: 4px;
            color: white;
            text-decoration: none;
            font-size: 12px;
        }

        .btn-excel {
            background: #28a745;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 12px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 4px;
        }

        th {
            background: #0b3d59;
            color: white;
        }
    </style>

</head>

<body>

    <div id="layout">

        <h3>Dados - Fiscal IO</h3>

        <div class="filters">

            <input type="text" id="notaFilter" onkeyup="applyAllFilters()" placeholder="Filtro de Nota">

            <a href="#" onclick="exportarExcel()" class="btn btn-excel">
                <i class="fas fa-file-excel"></i> Exportar Excel
            </a>

        </div>

        <div id="statusMessage" style="
padding:6px 12px;
margin-bottom:8px;
font-weight:bold;
color:#004085;
background:#cce5ff;
border:1px solid #b8daff;
border-radius:4px;
display:none;"></div>


        <table id="tabelaPrincipal" class="report">

            <thead>
                <tr>
                    <th>Dt.Emi</th>
                    <th>Hra.Emi</th>
                    <th>Filial (CNPJ)</th>
                    <th>Chave</th>
                    <th>Nota</th>
                    <th>Serie</th>
                    <th>CFOP</th>
                    <th>Emitente</th>
                    <th>Emit.IE</th>
                    <th>Transp.</th>
                    <th>Placa</th>
                    <th>Produto</th>
                    <th>Peso</th>
                    <th>Vlr Unit</th>
                    <th>Vlr Total</th>
                    <th>Info.Fisco.</th>
                    <th>Info.Compl.</th>
                    <th>Motivo</th>
                </tr>
            </thead>

            <tbody>

                <tr th:each="d : ${FISCALIO}">

                    <td th:text="${d.dtemi}"></td>
                    <td th:text="${d.hremi}"></td>
                    <td th:text="${d.filial}"></td>
                    <td th:text="${d.chave}"></td>
                    <td th:text="${d.nota}"></td>
                    <td th:text="${d.serie}"></td>
                    <td th:text="${d.cfop}"></td>
                    <td th:text="${d.emitnome}"></td>
                    <td th:text="${d.emitie}"></td>
                    <td th:text="${d.transpnome}"></td>
                    <td th:text="${d.placa}"></td>
                    <td th:text="${d.xprod}"></td>
                    <td th:text="${d.qcom}"></td>
                    <td th:text="${d.vuncom}"></td>
                    <td th:text="${d.vprod}"></td>
                    <td th:text="${d.infadfisco}"></td>
                    <td th:text="${d.infcpl}"></td>

                    <td>

                        <span th:each="a : ${AUDITORIA}" th:if="${a.CHAVEACESSO == d.chave}"
                            th:text="${a.MOTIVO}"></span>

                        <span th:if="${#lists.isEmpty(AUDITORIA)}">-</span>

                    </td>

                </tr>

            </tbody>
        </table>

    </div>


    <script th:inline="javascript">

        const notasMap = /*[[${DESCARGA}]]*/[];

    </script>


    <script>

        /* OCULTAR DUPLICADOS */

        function ocultarDuplicados() {

            const setOracle = new Set(
                notasMap.map(n => String(n.CHAVEACESSONFE).trim())
            );

            const rows = document.querySelectorAll("#tabelaPrincipal tbody tr");

            let ocultadas = 0;

            rows.forEach(row => {

                const cols = row.querySelectorAll("td");

                if (cols.length === 0) return;

                const chave = String(cols[3].textContent).trim();

                if (setOracle.has(chave)) {
                    row.style.display = "none";
                    ocultadas++;
                } else {
                    row.style.display = "";
                }

            });

            document.getElementById("statusMessage").style.display = "block";

            document.getElementById("statusMessage").textContent =
                `Ocultadas ${ocultadas} linhas que já existem no Viasoft.`;

        }



        /* FILTRO */

        function applyAllFilters() {

            var notaFilter = document.getElementById("notaFilter").value.toUpperCase();

            var rows = document.querySelectorAll("#tabelaPrincipal tbody tr");

            rows.forEach(row => {

                var nota = row.children[4].textContent.toUpperCase();

                if (nota.includes(notaFilter)) {
                    row.style.display = "";
                } else {
                    row.style.display = "none";
                }

            });

        }


        /* INIT */

        document.addEventListener("DOMContentLoaded", function () {

            ocultarDuplicados();

        });

    </script>

</body>

</html>
